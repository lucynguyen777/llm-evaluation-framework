version: "3.8"

services:
  api:
    build: .
    container_name: llm-eval-api
    ports:
      - "8000:8000"
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    networks:
      - llm-eval-net

  dashboard:
    build: .
    container_name: llm-eval-dashboard
    ports:
      - "8501:8501"
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/app
    depends_on:
      - api
    networks:
      - llm-eval-net

networks:
  llm-eval-net:
    driver: bridge